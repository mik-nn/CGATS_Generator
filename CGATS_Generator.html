<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>CGATS Generator</title>
<style>
    body { font-family: sans-serif; margin: 20px; background:#f5f5f5; }

    .wrapper {
        max-width: 1100px;
        margin: 0 auto;
    }

    .wrapper h1 {
        text-align: center;
        margin-bottom: 20px;
    }

    .container { display: flex; gap: 20px; }
    .card { background:white; padding:20px; border-radius:12px; flex:1; }
    .label { font-weight:600; margin-top:10px; display:block; }
    input { width:100%; padding:6px; margin-top:4px; border-radius:6px; border:1px solid #ccc; }
    .primaries-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-top:6px; }
    .primary-btn { padding:8px; border-radius:8px; border:none; cursor:pointer; background:#ddd; }
    .primary-btn.active { background:#222; color:white; }
    #preview-canvas { width:100%; background:#eee; border-radius:12px; margin-top:10px; }
    #btn-download { margin-top:20px; width:100%; padding:12px; background:#059669; color:white; border:none; border-radius:10px; cursor:pointer; font-size:16px; }
</style>
</head>
<body>

<div class="wrapper">
    <h1>CGATS 1.7 Generator</h1>

    <div class="container">

        <!-- LEFT PANEL -->
        <div class="card">
            <span class="label">Primaries</span>
            <div id="primaries-container" class="primaries-grid"></div>

            <span class="label">Number of patches</span>
            <input id="num-patches" type="number" value="21" min="1" />

            <span class="label">Patch width (mm)</span>
            <input id="patch-width" type="number" value="8" min="1" />

            <span class="label">Patch height (mm)</span>
            <input id="patch-height" type="number" value="8" min="1" />

            <span class="label">Page width (mm)</span>
            <input id="page-width" type="number" value="300" min="50" />

            <button id="btn-download">↓ Download CGATS</button>
        </div>

        <!-- RIGHT PANEL -->
        <div class="card">
            <h3>Preview</h3>
            <canvas id="preview-canvas"></canvas>
        </div>

    </div>
</div>

<script>
const PRIMARIES = ["C","M","Y","K","CM","CY","MY","CMY"];

let selectedPrimaries = ["C","M","Y","K"];
let numPatches = 21;
let patchWidth = 8;
let patchHeight = 8;
let pageWidth = 300;
let margin = 32;

const primariesContainer = document.getElementById("primaries-container");
const numPatchesInput = document.getElementById("num-patches");
const patchWidthInput = document.getElementById("patch-width");
const patchHeightInput = document.getElementById("patch-height");
const pageWidthInput = document.getElementById("page-width");
const canvas = document.getElementById("preview-canvas");
const ctx = canvas.getContext("2d");
const btnDownload = document.getElementById("btn-download");

function letterPair(n){
    const a = String.fromCharCode(65 + Math.floor(n/26));
    const b = String.fromCharCode(65 + (n%26));
    return a+b;
}

function renderPrimaries(){
    primariesContainer.innerHTML = "";
    PRIMARIES.forEach(p=>{
        const b=document.createElement("button");
        b.textContent=p;
        b.className="primary-btn"+(selectedPrimaries.includes(p)?" active":"");
        b.onclick=()=>{
            if(selectedPrimaries.includes(p))
                selectedPrimaries = selectedPrimaries.filter(x=>x!==p);
            else
                selectedPrimaries.push(p);
            renderPrimaries();
            updatePreview();
        };
        primariesContainer.appendChild(b);
    });
}

/* 1) Сколько патчей помещается в строку */
function computePatchesPerRow(){
    const usable = pageWidth - margin;
    const per = Math.floor(usable / patchWidth);
    return Math.max(1, per);
}

/* 2) ROWLENGTH для CGATS */
function computeRowLength(){
    const patchesPerRow = computePatchesPerRow();
    const totalPatches = selectedPrimaries.length * numPatches;
    return Math.ceil(totalPatches / patchesPerRow);
}

/* 3) CGATS-порядок (вертикальный) */
function buildPatches(){
    const patches = [];

    function getCMYK(primary,step){
        return {
            c: primary.includes("C")?step:0,
            m: primary.includes("M")?step:0,
            y: primary.includes("Y")?step:0,
            k: primary.includes("K")?step:0
        };
    }

    for(let s=0; s<numPatches; s++){
        const stepVal = numPatches>1 ? (s/(numPatches-1))*100 : 100;
        selectedPrimaries.forEach((p,pIdx)=>{
            const {c,m,y,k} = getCMYK(p,stepVal);
            patches.push({pIdx, s, c, m, y, k});
        });
    }
    return patches;
}

/* 4) CGATS файл */
function generateCGATS(){
    const ROWLENGTH = computeRowLength();
    const patches = buildPatches();
    const lines = [];

    lines.push("CGATS.17");
    lines.push("ROWLENGTH\t"+ROWLENGTH);
    lines.push('ORIGINATOR\t"Web CGATS Generator"');
    lines.push('DESCRIPTOR\t"Custom CMYK Target"');
    lines.push('CREATED\t"'+new Date().toISOString().split("T")[0]+'"');

    lines.push("NUMBER_OF_FIELDS\t5");
    lines.push("BEGIN_DATA_FORMAT");
    lines.push("SAMPLE_ID\tCMYK_C\tCMYK_M\tCMYK_Y\tCMYK_K");
    lines.push("END_DATA_FORMAT");
    lines.push("NUMBER_OF_SETS\t"+patches.length);
    lines.push("BEGIN_DATA");

    patches.forEach(p=>{
        const id = letterPair(p.pIdx) + String(p.s+1).padStart(2,"0");
        lines.push(`${id}\t${p.c.toFixed(2)}\t${p.m.toFixed(2)}\t${p.y.toFixed(2)}\t${p.k.toFixed(2)}`);
    });

    lines.push("END_DATA");
    return lines.join("\n");
}

/* 5) Превью — primary-major, строка продолжается пока не заполнится */
function drawPreview(){
    const patchesPerRow = computePatchesPerRow();
    const primaries = selectedPrimaries;
    const steps = numPatches;

    const pxW = patchWidth * 4;
    const pxH = patchHeight * 4;

    const totalPatches = primaries.length * steps;
    const totalRows = Math.ceil(totalPatches / patchesPerRow);

    canvas.width  = patchesPerRow * pxW;
    canvas.height = totalRows * pxH;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    let idx = 0;

    primaries.forEach((primary)=>{
        const hasC = primary.includes("C");
        const hasM = primary.includes("M");
        const hasY = primary.includes("Y");
        const hasK = primary.includes("K");

        for(let s=0; s<steps; s++){
            const row = Math.floor(idx / patchesPerRow);
            const col = idx % patchesPerRow;

            const step = steps>1 ? (s/(steps-1)) : 1;

            const C = hasC ? step : 0;
            const M = hasM ? step : 0;
            const Y = hasY ? step : 0;
            const K = hasK ? step : 0;

            const R = 255*(1-C)*(1-K);
            const G = 255*(1-M)*(1-K);
            const B = 255*(1-Y)*(1-K);

            const x = col * pxW;
            const y = row * pxH;

            ctx.fillStyle = `rgb(${R},${G},${B})`;
            ctx.fillRect(x,y,pxW,pxH);

            idx++;
        }
    });
}

function updatePreview(){ drawPreview(); }

/* Events */
numPatchesInput.oninput = ()=>{ numPatches = +numPatchesInput.value || 1; updatePreview(); };
patchWidthInput.oninput = ()=>{ patchWidth = +patchWidthInput.value || 1; updatePreview(); };
patchHeightInput.oninput = ()=>{ patchHeight = +patchHeightInput.value || 1; updatePreview(); };
pageWidthInput.oninput = ()=>{ pageWidth = +pageWidthInput.value || 1; updatePreview(); };

btnDownload.onclick = ()=>{
    const txt = generateCGATS();
    const blob = new Blob([txt],{type:"text/plain"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="CMYK_Target.txt";
    a.click();
};

renderPrimaries();
updatePreview();
</script>

</body>
</html>
